<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PatatesKRI Oyunu</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="container">


    <div class="archive">
        BETON ARCHIVE SUNAR
    </div>


    <h1>
        🥔 PATATESKRI
    </h1>


    <div class="info">

        <div>
            Skor:
            <span id="score">0</span>
        </div>


        <div>
            Süre:
            <span id="time">30</span>
        </div>

    </div>



    <div id="gameArea">


        <img 
        id="patates"
        src="assets/images/patates.png"
        class="item"
        alt="Normal Patates">



        <img 
        id="patatesKri"
        src="assets/images/patateskri.png"
        class="item"
        alt="PatatesKRI">



        <img 
        id="curuk"
        src="assets/images/curuk.png"
        class="item"
        alt="Çürük Patates">


    </div>




    <button id="startBtn">
        OYUNU BAŞLAT
    </button>



    <div id="message"></div>


</div>



<script src="script.js"></script>


</body>
</html>
